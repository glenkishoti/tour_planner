<div class="modal-overlay">
  <div class="modal-card">
    <h2>{{ tour ? 'Edit Tour' : 'Create Tour' }}</h2>

    <label>Name *</label>
    <input type="text" [(ngModel)]="name" placeholder="Tour name" />

    <div class="row">
      <div>
        <label>From *</label>
        <input type="text" [(ngModel)]="from" placeholder="Start location" />
      </div>
      <div>
        <label>To *</label>
        <input type="text" [(ngModel)]="to" placeholder="End location" />
      </div>
    </div>

    <label>Transport Type *</label>
    <select [(ngModel)]="transportType">
      <option *ngFor="let t of transportTypes" [value]="t">{{ t }}</option>
    </select>

    <label>Description</label>
    <textarea [(ngModel)]="description" rows="3" placeholder="Optional description"></textarea>

    <div class="row">
      <div>
        <label>Distance (km) *</label>
        <input type="number" [(ngModel)]="distance" placeholder="e.g. 42" min="0" />
      </div>
      <div>
        <label>Estimated Time (minutes) *</label>
        <input type="number" [(ngModel)]="estimatedTimeMinutes" placeholder="e.g. 180" min="0" />
      </div>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="modal-actions">
      <button class="btn-outline" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-green" (click)="onSave()">Save</button>
    </div>
  </div>
</div>
