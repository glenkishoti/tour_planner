version: '3.3'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tourplanner-postgres
    environment:
      POSTGRES_DB: tourplanner
      POSTGRES_USER: touruser
      POSTGRES_PASSWORD: tourpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./tourplanner-backend
      dockerfile: Dockerfile
    container_name: tourplanner-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tourplanner
      SPRING_DATASOURCE_USERNAME: touruser
      SPRING_DATASOURCE_PASSWORD: tourpass
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlbXlqd3RzZWNyZXRrZXlmb3Jwcm9kdWN0aW9udXNldXNl}
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./tourplanner-frontend
      dockerfile: Dockerfile
    container_name: tourplanner-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
