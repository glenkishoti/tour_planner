# Development Profile Configuration
# This file can contain local development settings
# DO NOT COMMIT SENSITIVE VALUES TO GIT

# Server
server.port=8080

# PostgreSQL datasource (local development)
spring.datasource.url=jdbc:postgresql://localhost:5432/tourplanner
spring.datasource.username=touruser
spring.datasource.password=tourpass

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (dev only - change in production)
jwt.secret=dev-secret-key-not-for-production
jwt.expiration=86400000
