spring.application.name=tourplanner-backend

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tourplanner}
spring.datasource.username=${DB_USERNAME:touruser}
spring.datasource.password=${DB_PASSWORD:tourpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL initialization
spring.sql.init.mode=always

# JWT - secret must be Base64 encoded. Default is 'changemyjwtsecretkeyforproductionuseuse' (32 chars = 256 bits)
jwt.secret=${JWT_SECRET:Y2hhbmdlbXlqd3RzZWNyZXRrZXlmb3Jwcm9kdWN0aW9udXNldXNl}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OpenRouteService API Configuration
# Get your free API key from: https://openrouteservice.org/dev/#/signup
openrouteservice.api.key=${ORS_API_KEY:}

# File Upload Configuration
app.upload.dir=${UPLOAD_DIR:uploads/images}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB