spring.application.name=tourplanner-backend

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tourplanner}
spring.datasource.username=${DB_USERNAME:touruser}
spring.datasource.password=${DB_PASSWORD:tourpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL initialization
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET:change-me-in-production-this-is-not-secure}
jwt.expiration=${JWT_EXPIRATION:86400000}